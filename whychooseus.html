<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PG Meter Stats</title>

<style>
body{
    margin:0;
    padding:00px;
    background:#f5f7fa;
}


?*             emoji indicate                         */
    .why-link{
    text-align:center;
    margin:40px 0;
}

.why-btn{
    display:inline-block;
    padding:15px 35px;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    border-radius:50px;
    position:relative;
    animation:pulse 1.5s infinite;
    box-shadow:0 0 0 rgba(37,99,235,0.7);
}

.why-btn::after{
    content:"👇 Click Here";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:-28px;
    color:#ff6600;
    font-size:14px;
    font-weight:bold;
    animation:bounce 1s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(37,99,235,0.7);
    }
    70%{
        transform:scale(1.05);
        box-shadow:0 0 0 20px rgba(37,99,235,0);
    }
    100%{
        transform:scale(1);
    }
}

@keyframes bounce{
    0%,100%{
        transform:translateX(-50%) translateY(0);
    }
    50%{
        transform:translateX(-50%) translateY(6px);
    }
}






    

.meter-container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.meter{
    width:220px;
    height:220px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.progress{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:10%;
    background:conic-gradient(#2563eb 0deg,#1e293b 0deg);
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 10px),black 0);
    mask:radial-gradient(farthest-side,transparent calc(100% - 10px),black 0);
}

.innerr{
    width:180px;
    height:180px;
    background:#111827;
    border-radius:50%;
    position:absolute;
}

.valuess{
    position:relative;
    z-index:2;
    font-size:45px;
    font-weight:bold;
    color:white;
}

.labelc{
    position:absolute;
    bottom:45px;
    color:#93c5fd;
    font-size:14px;
    z-index:2;
}

@media(max-width:768px){

    .meter-container{
        display:flex;
        flex-wrap:nowrap;
        gap:5px;
        justify-content:center;
    }

    .meter{
        width:110px;
        height:110px;
    }

    .innerr{
        width:85px;
        height:85px;
    }

    .valuess{
        font-size:20px;
    }

    .labelc{
        bottom:18px;
        font-size:10px;
    }
}
</style>
</head>

<body>

<div class="meter-container">

    <div class="meter">
        <div class="progress" id="p1"></div>
        <div class="innerr"></div>
        <div class="valuess" id="v1">0</div>
        <div class="labelc">Residents</div>
    </div>

    <div class="meter">
        <div class="progress" id="p2"></div>
        <div class="innerr"></div>
        <div class="valuess" id="v2">0</div>
        <div class="labelc">Years</div>
    </div>

    <div class="meter">
        <div class="progress" id="p3"></div>
        <div class="innerr"></div>
        <div class="valuess" id="v3">0</div>
        <div class="labelc">Rooms</div>
    </div>

</div>

<script>
function run(vId,pId,target){

    let v=document.getElementById(vId);
    let p=document.getElementById(pId);

    let val=0;

    let interval=setInterval(()=>{

        val++;
        v.innerText=val;

        let deg=(val/target)*360;

        p.style.background=`conic-gradient(
            #22c55e ${deg}deg,
            #1e293b ${deg}deg
        )`;

        if(val>=target){
            clearInterval(interval);
            v.innerText=target+"+";
        }

    },40);
}

run("v1","p1",35);
run("v2","p2",3);
run("v3","p3",20);
</script>

</body>
</html>
