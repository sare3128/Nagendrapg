
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edge Ring Meter</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    background:#0f172a;
}

/* OUTER RING */
.meter{
    width:220px;
    height:220px;
    border-radius:50%;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* PROGRESS RING (YOUR ORIGINAL STYLE) */
.progress{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:10%;
    background:conic-gradient(
        #2563eb 0deg,
        #2563eb 0deg,
        #1e293b 0deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), black 0);
    mask: radial-gradient(farthest-side, transparent calc(100% - 10px), black 0);
}

/* INNER CIRCLE */
.innerr{
    width:180px;
    height:180px;
    background:#111827;
    border-radius:50%;
    position:absolute;
}

/* NUMBER */
.valuess{
    position:relative;
    z-index:2;
    font-size:45px;
    font-weight:bold;
    color:white;
}

.labelc{
    position:absolute;
    bottom:45px;
    font-size:14px;
    color:#93c5fd;
    z-index:2;
}
</style>
</head>

<body>

<!-- 1 -->
<div class="meter">
    <div class="progress" id="p1"></div>
    <div class="innerr"></div>
    <div class="valuess" id="v1">0</div>
    <div class="labelc">Residents</div>
</div>

<!-- 2 -->
<div class="meter">
    <div class="progress" id="p2"></div>
    <div class="innerr"></div>
    <div class="valuess" id="v2">0</div>
    <div class="labelc">Experience</div>
</div>

<!-- 3 -->
<div class="meter">
    <div class="progress" id="p3"></div>
    <div class="innerr"></div>
    <div class="valuess" id="v3">0</div>
    <div class="labelc">Rooms</div>
</div>

<script>
function run(vId, pId, target){

    let v = document.getElementById(vId);
    let p = document.getElementById(pId);

    let val = 0;

    let interval = setInterval(() => {

        val++;
        v.innerText = val;

        let deg = (val / target) * 360;

        p.style.background = `conic-gradient(
            #22c55e ${deg}deg,
            #1e293b ${deg}deg
        )`;

        if(val >= target){
            clearInterval(interval);
            v.innerText = target + "+";
            p.style.background = `conic-gradient(#22c55e 360deg, #1e293b 0deg)`;
        }

    }, 40);
}

run("v1","p1",35);
run("v2","p2",3);
run("v3","p3",20);
</script>

</body>
</html>
