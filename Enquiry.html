
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagendra PG Enquiry</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='%232563eb'/>
<text x='50%' y='70%' font-size='60'
font-family='Arial Black'
text-anchor='middle'
fill='white'>N</text>
</svg>">
</head>
    <a href="index.html"
   class="fixed top-4 left-4 bg-white text-blue-700 font-semibold px-4 py-2 rounded-full shadow-lg hover:bg-blue-100">
   ← Back
</a>

<body class="bg-sky-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border border-sky-300">

    <h2 class="text-3xl font-bold text-center text-blue-800 mb-2">
        🏠 Room Requirement
    </h2>

    <p class="text-center text-slate-600 mb-6">
        Find Your Perfect Room At Nagendra PG
    </p>

    <div class="bg-sky-50 border-l-4 border-blue-600 text-blue-900 p-3 rounded-lg mb-6">
        📍 Electronic City Phase 2, Bangalore
    </div>

    <label class="block font-semibold mb-2">
        👤 Full Name <span class="text-red-500">*</span>
    </label>
    <input
        type="text"
        id="name"
        placeholder="Enter Your Name"
        class="w-full p-3 border-2 border-sky-300 rounded-xl mb-4 focus:outline-none focus:border-blue-600">

    <label class="block font-semibold mb-2">
        📱 Mobile Number <span class="text-red-500">*</span>
    </label>
    <input
        type="tel"
        id="mobile"
        maxlength="10"
        placeholder="Enter Mobile Number"
        class="w-full p-3 border-2 border-sky-300 rounded-xl mb-4 focus:outline-none focus:border-blue-600">

    <label class="block font-semibold mb-2">
        🛏️ Sharing Type <span class="text-red-500">*</span>
    </label>
    <select
        id="sharingType"
        class="w-full p-3 border-2 border-sky-300 rounded-xl mb-4 focus:outline-none focus:border-blue-600">

        <option value="">Select Sharing Type</option>
        <option>1 Sharing Room</option>
        <option>2 Sharing Room</option>
        <option>3 Sharing Room</option>
        <option>4 Sharing Room</option>
    </select>

    <label class="block font-semibold mb-2">
        📅 When Do You Need Room? <span class="text-red-500">*</span>
    </label>
    <select
        id="moveIn"
        class="w-full p-3 border-2 border-sky-300 rounded-xl mb-6 focus:outline-none focus:border-blue-600">

        <option value="">Select Requirement</option>
        <option>Immediately</option>
        <option>Within 15 Days</option>
        <option>Within 1 Month</option>
    </select>

    <button
        onclick="sendWhatsApp()"
        class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl transition">

        📲 WhatsApp Enquiry
    </button>

</div>

<script>
function sendWhatsApp(){

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let sharing = document.getElementById("sharingType").value;
    let moveIn = document.getElementById("moveIn").value;

    if(name==="" || mobile==="" || sharing==="" || moveIn===""){
        alert("Please fill all required fields (*)");
        return;
    }

    let msg =
`🏠 Nagendra PG Enquiry

👤 Name: ${name}
📱 Mobile: ${mobile}

🛏️ Sharing Type: ${sharing}

📅 Requirement: ${moveIn}

Please share room availability details.`;

    window.open(
        "https://wa.me/919353656225?text=" +
        encodeURIComponent(msg),
        "_blank"
    );
}
</script>

</body>
</html>
